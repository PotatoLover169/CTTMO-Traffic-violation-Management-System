<!-- Google reCAPTCHA v2 Integration -->
{% load static %}
<!-- Load optimization script first for preconnect hints -->
<script src="{% static 'js/recaptcha-optimization.js' %}"></script>
<script src="{% static 'js/recaptcha-handler.js' %}"></script>
<script src="{% static 'js/auto-protect-forms.js' %}"></script>
<style>
    /* Optimized styles for reCAPTCHA container */
    .recaptcha-container {
        margin: 1.5rem auto;
        min-height: 78px; /* Minimum height to prevent layout shifts */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
    }
    
    /* Wrapper for better centering */
    .g-recaptcha-wrapper {
        display: inline-block;
        margin: 0 auto;
    }
    
    /* Loading placeholder style */
    .recaptcha-placeholder {
        border: 1px dashed #dee2e6;
        padding: 0.75rem;
        text-align: center;
        border-radius: 4px;
        background-color: #f8f9fa;
        width: 302px; /* Standard reCAPTCHA width */
        max-width: 100%;
        margin: 0 auto;
    }
    
    /* Fix for reCAPTCHA on mobile devices */
    @media (max-width: 400px) {
        .g-recaptcha {
            transform: scale(0.85);
            transform-origin: center center;
            margin-bottom: -10px;
        }
        
        .recaptcha-placeholder {
            width: 260px; /* Smaller width for mobile */
        }
    }
    
    /* Animation for loading and transitions */
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    
    .recaptcha-container > div {
        animation: fadeIn 0.3s ease-in-out;
    }
    
    /* Error message styling */
    .recaptcha-error {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 0.5rem;
        width: 100%;
        text-align: center;
    }
    
    /* Success indicator styling */
    .recaptcha-verification-status {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.25rem;
        margin-top: 0.5rem;
    }
    
    /* Center the reCAPTCHA iframe itself */
    .grecaptcha-badge {
        margin: 0 auto;
    }
</style>
